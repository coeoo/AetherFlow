services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: aetherflow_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aetherflow_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
